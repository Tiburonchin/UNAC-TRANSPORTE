<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Movilidad UNAC</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                        url('Azul Viaje Ofertas y Descuentos Sitio Web (2).png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* NAVBAR IGUAL A RUTAS/CONSULTAS */
        .navbar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-weight: bold; font-size: 0.8rem; line-height: 1.2; }
        .logo span { color: #ffb400; }

        .menu { display: flex; align-items: center; gap: 20px; }
        .menu a { color: #fff; text-decoration: none; font-size: 0.8rem; transition: 0.3s; }
        .menu a:hover { color: #ffb400; }
        .menu a.active { color: #ffb400; font-weight: bold; }

        /* Botón dorado de Consultas */
        .btn-consultas {
            border: 1px solid #ffb400;
            color: #ffb400 !important;
            padding: 5px 15px;
            border-radius: 5px;
        }
        .btn-consultas:hover { background: #ffb400; color: #000 !important; }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            width: 100%;
            max-width: 800px;
            padding: 60px 20px;
            text-align: center;
        }

        .section-tag { color: #ffb400; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; display: block; }
        .section-title { font-size: 2.8rem; font-weight: 800; margin-bottom: 30px; }

        /* TARJETA DE BÚSQUEDA */
        .search-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 180, 0, 0.2);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            background: #000;
            border: 2px solid #1a1a1a;
            color: #fff;
            border-radius: 8px;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #ffb400; }

        .btn-search {
            background: #ffb400;
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* RESULTADOS */
        .results-container {
            display: none;
            text-align: left;
            background: rgba(15, 15, 15, 0.95);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #1a1a1a;
        }

        .data-item { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .data-item label { color: #ffb400; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; display: block; }
        .data-item p { font-size: 1.1rem; margin-top: 5px; }

        .status-success {
            background: rgba(45, 164, 78, 0.1);
            color: #a6f3b7;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            border: 1px solid #2da44e;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">UNIVERSIDAD NACIONAL DEL CALLAO<br><span>MOVILIDAD UNIVERSITARIA</span></div>
        <div class="menu">
            <a href="index.html">Inicio</a>
            <a href="horarios.html">Horarios</a>
            <a href="rutas.html">Rutas</a>
            <a href="registro.html" class="active">Registro</a>
            <a href="noticias.html">Noticias</a>
            <a href="consultas.html" class="btn-consultas">Consultas</a>
        </div>
    </nav>

    <main class="main-content">
        <span class="section-tag">PADRÓN 2026-A</span>
        <h1 class="section-title">Consulta de Registro</h1>
        
        <div class="search-card">
            <input type="text" id="dniInput" placeholder="70718321">
            <br>
            <button class="btn-search" id="searchBtn">VERIFICAR DATOS</button>
        </div>

        <div class="results-container" id="resultsBox">
            <div class="data-item"><label>ESTUDIANTE:</label><p id="resNombre"></p></div>
            <div class="data-item"><label>CÓDIGO UNAC:</label><p id="resCodigo"></p></div>
            <div class="data-item"><label>FACULTAD:</label><p id="resFacultad"></p></div>
            <div class="data-item"><label>HORARIO:</label><p id="resHorario"></p></div>
            <div class="status-success">REGISTRO ENCONTRADO EN LA COLUMNA F ✅</div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzvOKvaSny1fecoF3Sd18Nsu3GlQgNfvUtEA1bPHiFXJVSlbkmSO47bwS71_dTbC5-Q/exec';
        const searchBtn = document.getElementById('searchBtn');
        const resultsBox = document.getElementById('resultsBox');

        searchBtn.addEventListener('click', () => {
            const dni = document.getElementById('dniInput').value.trim();
            if(!dni) return alert("Ingresa un DNI");

            searchBtn.innerText = "BUSCANDO...";
            searchBtn.disabled = true;
            resultsBox.style.display = 'none';

            fetch(API_URL + '?dni=' + dni)
                .then(res => res.json())
                .then(data => {
                    searchBtn.innerText = "VERIFICAR DATOS";
                    searchBtn.disabled = false;
                    if(data.found) {
                        document.getElementById('resNombre').innerText = data.Nombres;
                        document.getElementById('resCodigo').innerText = data.Codigo;
                        document.getElementById('resFacultad').innerText = data.Facultad;
                        document.getElementById('resHorario').innerText = data.Horario;
                        resultsBox.style.display = 'block';
                    } else {
                        alert("No se encontró el DNI " + dni);
                    }
                }).catch(() => {
                    searchBtn.disabled = false;
                    alert("Error de conexión");
                });
        });
    </script>
</body>
</html>
