<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Movilidad UNAC</title>
    <style>
        /* FORMATO HEREDADO DE TU PÁGINA DE RUTAS */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Usando tu misma imagen de fondo */
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                        url('Azul Viaje Ofertas y Descuentos Sitio Web (2).png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* NAVBAR IDÉNTICA */
        .navbar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 5%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-weight: bold; font-size: 0.8rem; line-height: 1.2; text-align: left;}
        .logo span { color: #ffb400; }
        
        .menu { display: flex; gap: 15px; align-items: center; }
        .menu a { color: #fff; text-decoration: none; font-size: 0.8rem; font-weight: 500; transition: 0.3s; }
        .menu a:hover { color: #ffb400; }
        .menu a.active { color: #ffb400; font-weight: bold; }

        /* CONTENIDO ESTILO RUTAS */
        .main-content {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
        }

        .section-tag { color: #ffb400; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; display: block; text-transform: uppercase; }
        .section-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 30px; line-height: 1.1; }

        /* TARJETA DE BÚSQUEDA */
        .search-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 180, 0, 0.2);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 100%;
            max-width: 350px;
            padding: 15px;
            background: #000;
            border: 1px solid #ffb400;
            color: #fff;
            border-radius: 8px;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }

        .btn-search {
            background: #ffb400;
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-search:hover { background: #fff; transform: scale(1.05); }
        .btn-search:disabled { background: #555; cursor: not-allowed; }

        /* RESULTADOS */
        .results-container {
            display: none; /* Se activa con JS */
            text-align: left;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 12px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .data-item { margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .data-item label { color: #ffb400; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; display: block; }
        .data-item p { font-size: 1.1rem; margin-top: 4px; }

        .status-badge {
            background: rgba(45, 164, 78, 0.2);
            color: #a6f3b7;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            border: 1px solid #2da44e;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">UNIVERSIDAD NACIONAL DEL CALLAO<br><span>MOVILIDAD UNIVERSITARIA</span></div>
        <div class="menu">
            <a href="index.html">Inicio</a>
            <a href="horarios.html">Horarios</a>
            <a href="rutas.html">Rutas</a>
            <a href="registro.html" class="active">Registro</a>
            <a href="consultas.html">Consultas</a>
        </div>
    </nav>

    <main class="main-content">
        <span class="section-tag">Padrón 2026-A</span>
        <h1 class="section-title">Consulta de Registro</h1>
        
        <div class="search-card">
            <input type="text" id="dniInput" placeholder="Ingresa tu DNI">
            <br>
            <button class="btn-search" id="searchBtn">Verificar Datos</button>
        </div>

        <div class="results-container" id="resultsBox">
            <div class="data-item">
                <label>Estudiante:</label>
                <p id="resNombre">-</p>
            </div>
            <div class="data-item">
                <label>Código UNAC:</label>
                <p id="resCodigo">-</p>
            </div>
            <div class="data-item">
                <label>Facultad:</label>
                <p id="resFacultad">-</p>
            </div>
            <div class="data-item">
                <label>Horario:</label>
                <p id="resHorario">-</p>
            </div>
            <div class="status-badge">
                REGISTRO ENCONTRADO EN LA COLUMNA F ✅
            </div>
        </div>
    </main>

    <script>
        // TU NUEVO LINK DE IMPLEMENTACIÓN
        const API_URL = 'https://script.google.com/macros/s/AKfycbzvOKvaSny1fecoF3Sd18Nsu3GlQgNfvUtEA1bPHiFXJVSlbkmSO47bwS71_dTbC5-Q/exec';

        const searchBtn = document.getElementById('searchBtn');
        const resultsBox = document.getElementById('resultsBox');

        searchBtn.addEventListener('click', () => {
            const dni = document.getElementById('dniInput').value.trim();
            
            if(!dni) {
                alert("Por favor, ingresa un número de DNI.");
                return;
            }

            searchBtn.innerText = "BUSCANDO...";
            searchBtn.disabled = true;
            resultsBox.style.display = 'none';

            fetch(API_URL + '?dni=' + dni)
                .then(response => response.json())
                .then(data => {
                    searchBtn.innerText = "VERIFICAR DATOS";
                    searchBtn.disabled = false;

                    if(data.found) {
                        document.getElementById('resNombre').innerText = data.Nombres;
                        document.getElementById('resCodigo').innerText = data.Codigo;
                        document.getElementById('resFacultad').innerText = data.Facultad;
                        document.getElementById('resHorario').innerText = data.Horario;
                        
                        resultsBox.style.display = 'block';
                        resultsBox.scrollIntoView({ behavior: 'smooth' });
                    } else {
                        alert("El DNI " + dni + " no figura en el registro actual. Revisa si lo escribiste bien o contacta al delegado.");
                    }
                })
                .catch(error => {
                    searchBtn.innerText = "VERIFICAR DATOS";
                    searchBtn.disabled = false;
                    alert("Error crítico: No se pudo conectar con el Google Sheet. Verifica tu conexión.");
                    console.error("Error:", error);
                });
        });
    </script>
</body>
</html>
