    <style>
        /* --- ESTILO BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- NAVBAR --- */
        .navbar { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 5%; 
            background: #0a0a0a; 
            border-bottom: 1px solid #222; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }
        .logo { font-weight: bold; font-size: 0.8rem; }
        .logo span { color: #ffb400; }
        .menu { display: flex; gap: 15px; }
        .menu a { color: #fff; text-decoration: none; font-size: 0.85rem; }
        .menu a.active { color: #ffb400; font-weight: bold; }

        /* --- CONTENEDOR --- */

            max-width: 1000px; 
            margin: 40px auto; 
            padding: 0 20px; 
        }
        h1 { font-size: 2.2rem; margin-bottom: 30px; text-align: center; }

        /* --- GRID DE NOTICIAS --- */
        .news-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; 
        }

        /* --- ESTILO DE TARJETA ORIGINAL (OPTIMIZADO) --- */
        .news-card { 
            background: #0c0f16; 
            border: 1px solid #1e293b; 
            border-radius: 12px; 
            overflow: hidden; 
            transition: 0.3s; 
            padding: 20px;
            cursor: pointer;
        }
        .news-card:hover { 
            border-color: #ffb400; 
            transform: translateY(-5px); 
        }

        /* --- IMAGEN DENTRO DEL HTML --- */
        .news-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #222;
        }

        .news-date { 
            color: #ffb400; 
            font-size: 0.8rem; 
            font-weight: bold; 
            margin-bottom: 8px;
            display: block;
        }
        .news-title { 
            font-size: 1.25rem; 
            margin-bottom: 10px; 
            color: #fff; 
        }
        .news-excerpt { 
            color: #94a3b8; 
            font-size: 0.9rem; 
            line-height: 1.5; 
        }
    </style>
